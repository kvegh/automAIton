---
- name: Install and configure zabbix agent
  hosts: all
  tasks:
  
    - name: download Zabbix repo
      ansible.builtin.get_url:
        url: https://repo.zabbix.com/RPM-GPG-KEY-ZABBIX
        dest: /home/ansible/
        mode: '0440'

    - name: import key
      ansible.builtin.rpm_key:
        state: present
        key: /home/ansible/RPM-GPG-KEY-ZABBIX
      
    - name: Install zabbix agent
      ansible.builtin.package:
        name: https://repo.zabbix.com/zabbix/7.4/release/rhel/9/noarch/zabbix-release-latest.el9.noarch.rpm
  
    - name: Configure zabbix agent
      ansible.builtin.template:
        src: zabbix_agentd.conf.j2
        dest: /etc/zabbix/zabbix_agentd.conf
  
  handlers:
    - name: restart zabbix-agent
      ansible.builtin.service:
        name: zabbix-agent
        state: restarted
