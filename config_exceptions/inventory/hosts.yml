all:
  children:
    # --- Function groups cascade into rhel9 ---
    # Each host is defined once; rhel9 membership is inherited.
    rhel9:
      children:
        db_servers:
          hosts:
            server1:
            server5:
        webservers:
          hosts:
            server3:
            server7:
        appservers:
          hosts:
            server4:
            server8:
        bastion_hosts:
          hosts:
            server2:
        sap:
          hosts:
            server6:

    # --- Lifecycle environments (Satellite content views) ---
    dev:
      hosts:
        server8:
    test:
      hosts:
        server4:
    prod:
      hosts:
        server1:
        server2:
        server3:
        server5:
        server6:
        server7:

    # --- Network zones ---
    dmz:
      hosts:
        server2:
        server8:

    # --- Compliance scopes ---
    pci_scope:
      hosts:
        server6:
        server7:
