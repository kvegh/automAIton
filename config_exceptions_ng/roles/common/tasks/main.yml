---
- name: Apply sysctl settings
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    reload: true
  loop: "{{ sysctl_settings | default({}) | dict2items }}"
  tags: [sysctl]

- name: Disable Transparent Huge Pages
  ansible.builtin.copy:
    dest: /etc/tmpfiles.d/thp.conf
    content: "w /sys/kernel/mm/transparent_hugepage/enabled - - - - never\n"
    owner: root
    group: root
    mode: "0644"
  when: thp_enabled is defined and not thp_enabled
  tags: [sysctl]

- name: Configure mount options
  ansible.posix.mount:
    src: "{{ item.device }}"
    path: "{{ item.path }}"
    fstype: "{{ item.fstype }}"
    opts: "{{ item.opts }}"
    state: mounted
  loop: "{{ mount_options | default([]) }}"
  tags: [mounts]

- name: Open firewalld ports
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
  loop: "{{ firewalld_ports | default([]) }}"
  tags: [firewall]
