---
- name: Configure Zabbix checks for testserver
  hosts: localhost
  gather_facts: false

  vars_files:
    - myvars

  vars:
    zabbix_api_url: "https://{{ zabbix_server }}"
    zabbix_api_token: "{{ zabbix_token }}"
    target_host: "testserver"
    webapp_url: "http://testserver/index.php"
    eda_webhook_url: "REPLACE_WITH_EDA_WEBHOOK_URL"

  module_defaults:
    zabbix.zabbix.zabbix_host:
      zabbix_api_url: "{{ zabbix_api_url }}"
      zabbix_api_token: "{{ zabbix_api_token }}"
    ansible.builtin.uri:
      url: "{{ zabbix_api_url }}/api_jsonrpc.php"
      method: POST
      headers:
        Authorization: "Bearer {{ zabbix_api_token }}"
        Content-Type: "application/json"
      body_format: json

  tasks:
    - name: Link monitoring templates to host
      zabbix.zabbix.zabbix_host:
        state: present
        host: "{{ target_host }}"
        templates:
          - "ICMP Ping"
          - "Apache by HTTP"
          - "Linux by Zabbix agent"

    - name: Get host ID
      ansible.builtin.uri:
        body:
          jsonrpc: "2.0"
          method: "host.get"
          params:
            filter:
              host: "{{ target_host }}"
          id: 1
      register: host_info

    - name: Set hostid fact
      ansible.builtin.set_fact:
        hostid: "{{ host_info.json.result[0].hostid }}"

    - name: Create web scenario to check webapp response
      ansible.builtin.uri:
        body:
          jsonrpc: "2.0"
          method: "httptest.create"
          params:
            name: "Webapp health check"
            hostid: "{{ hostid }}"
            delay: "60s"
            steps:
              - name: "Check webapp response"
                url: "{{ webapp_url }}"
                status_codes: "200"
                required: "Webapp is up and running, all is good."
                "no": 1
          id: 1

    - name: Create trigger for webapp check failure
      ansible.builtin.uri:
        body:
          jsonrpc: "2.0"
          method: "trigger.create"
          params:
            description: "Webapp health check failed on {{ target_host }}"
            expression: "last(/{{ target_host }}/web.test.fail[Webapp health check])<>0"
            priority: 4
          id: 1
      register: trigger_result

    - name: Configure EDA webhook media for admin user
      ansible.builtin.uri:
        body:
          jsonrpc: "2.0"
          method: "user.update"
          params:
            userid: "1"
            medias:
              - mediatypeid: "72"
                sendto: "{{ eda_webhook_url }}"
                active: 0
                severity: 63
                period: "1-7,00:00-24:00"
          id: 1

    - name: Create action to send EDA webhook on trigger
      ansible.builtin.uri:
        body:
          jsonrpc: "2.0"
          method: "action.create"
          params:
            name: "Notify EDA on webapp failure"
            eventsource: 0
            status: 0
            filter:
              evaltype: 0
              conditions:
                - conditiontype: 2
                  operator: 2
                  value: "{{ trigger_result.json.result.triggerids[0] }}"
            operations:
              - operationtype: 1
                opmessage:
                  mediatypeid: "72"
                  subject: "Webapp down on {{ target_host }}"
                  message: "{TRIGGER.NAME} on {HOST.NAME}"
                opmessage_grp: []
                opmessage_usr:
                  - userid: "1"
          id: 1
