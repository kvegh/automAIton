---
- name: Configure Zabbix checks for testserver
  hosts: localhost
  gather_facts: false

  vars_files:
    - myvars

  vars:
    zabbix_api_url: "https://{{ zabbix_server }}"
    zabbix_api_token: "{{ zabbix_token }}"
    target_host: "testserver"

  module_defaults:
    zabbix.zabbix.zabbix_host:
      zabbix_api_url: "{{ zabbix_api_url }}"
      zabbix_api_token: "{{ zabbix_api_token }}"

  tasks:
    - name: Link monitoring templates to host
      zabbix.zabbix.zabbix_host:
        state: present
        host: "{{ target_host }}"
        templates:
          - "ICMP Ping"
          - "Apache by HTTP"
          - "Linux by Zabbix agent"

