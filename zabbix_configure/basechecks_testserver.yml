● ---
  - name: Configure Zabbix checks for existing host
    hosts: localhost
    gather_facts: false
 
    vars:
      zabbix_api_url: "http://{{ zabbix_server }}"
      zabbix_api_token: "{{ zabbix_api_token }}"
      target_host: "testserver"

    tasks:
      - name: Link monitoring templates to host
        zabbix.zabbix.host:
          host: "{{ target_host }}"
          templates:
            - "ICMP Ping"
            - "Apache by HTTP"
            - "Linux by Zabbix agent"
          macros:
            - macro: "{$HTTP_PORT}"
              value: "80"
  
      - name: Add TCP port checks (SSH and web)
        zabbix.zabbix.item:
          host: "{{ target_host }}"
          items:
            - name: "SSH port check"
              key: "net.tcp.port[,22]"
              type: ZABBIX_AGENT
              value_type: NUMERIC_UNSIGNED
            - name: "HTTP port check"
              key: "net.tcp.port[,80]"
              type: ZABBIX_AGENT
              value_type: NUMERIC_UNSIGNED
 
      - name: Add Apache process check item
        zabbix.zabbix.item:
          host: "{{ target_host }}"
          items:
            - name: "Apache process count"
              key: "proc.num[httpd]"
              type: ZABBIX_AGENT
              value_type: NUMERIC_UNSIGNED

      - name: Add trigger for Apache process down
        zabbix.zabbix.trigger:
          host: "{{ target_host }}"
          triggers:
            - description: "Apache is not running"
              expression: "last(/{{ target_host }}/proc.num[httpd])=0"
              priority: HIGH


